<!-- @dsCard group="RemedyPills Pharmacy" viewport="380x700" name="Patient App" subtitle="Auth → Home → Rx → Reminders → Care → Health → Account" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>RemedyPills Pharmacy — App UI Kit</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html,body{margin:0;background:#eef2f6;font-family:var(--font-sans);}
  .stage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;}
  .phone{width:380px;height:760px;background:hsl(var(--rp-background));border-radius:36px;box-shadow:0 30px 60px rgba(15,23,42,.25);overflow:hidden;display:flex;flex-direction:column;position:relative;border:8px solid #111827;}
  .screen{flex:1;overflow-y:auto;}
</style>
</head>
<body>
<div class="stage"><div class="phone"><div id="root" class="screen"></div></div></div>

<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="AuthScreen.jsx"></script>
<script type="text/babel" src="HomeTab.jsx"></script>
<script type="text/babel" src="PrescriptionsTab.jsx"></script>
<script type="text/babel" src="RemindersTab.jsx"></script>
<script type="text/babel" src="AppointmentsTab.jsx"></script>
<script type="text/babel" src="HealthTab.jsx"></script>
<script type="text/babel" src="AccountTab.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [authed, setAuthed] = useState(false);
  const [tab, setTab] = useState("home");

  if (!authed) return <AuthScreen onLogin={() => setAuthed(true)} />;

  const TABS = {
    home: <HomeTab onNav={setTab} />,
    prescriptions: <PrescriptionsTab />,
    reminders: <RemindersTab />,
    appointments: <AppointmentsTab />,
    health: <HealthTab />,
    account: <AccountTab onLogout={() => setAuthed(false)} />,
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", minHeight: "100%" }}>
      <TopBar onNotifications={() => {}} />
      <main style={{ flex: 1 }}>{TABS[tab]}</main>
      <BottomNav tab={tab} setTab={setTab} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
