<script type="text/babel">
const { useState } = React;

function App() {

    home: <HomePage setPage={setPage} />,
    about: <AboutPage />,
    faq: <FaqPage />,

  };
  return (
    <div>
      <Header page={page} setPage={setPage} />
      {PAGES[page]}
      <Footer setPage={setPage} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
