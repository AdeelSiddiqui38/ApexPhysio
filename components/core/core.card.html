<!DOCTYPE html>
<html>
<head>

<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, Badge, Card, Input } = window.RemedyPillsNBVDesignSystem_4359c3;

function Row({ label, children }) {
  return (
    <div style={{ marginBottom: 16 }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: '#94a3b8', textTransform: 'uppercase', letterSpacing: '.05em', marginBottom: 8 }}>{label}</div>
      <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', alignItems: 'center' }}>{children}</div>
    </div>
  );
}

function Demo() {
  return (
    <div>
      <Row label="Buttons — RemedyPills">
        <Button variant="primary">Refill</Button>
        <Button variant="accent">Book Service</Button>
        <Button variant="secondary">Cancel</Button>
        <Button variant="outline">Snooze</Button>
        <Button pill size="lg">GET STARTED</Button>
      </Row>
      <Row label="Buttons — NBV">
        <Button brand="nbv" variant="primary">Contact Us</Button>
        <Button brand="nbv" variant="accent">Discover Programs</Button>
        <Button brand="nbv" variant="outline">Explore Programs</Button>
      </Row>
      <Row label="Badges / Status pills">
        <Badge tone="active">Active</Badge>
        <Badge tone="processing">Processing</Badge>
        <Badge tone="ready">Ready for Pickup</Badge>
        <Badge tone="completed">Completed</Badge>
        <Badge tone="primary">New</Badge>
      </Row>
      <Row label="Cards">
        <Card style={{ width: 220 }}>RemedyPills card — soft shadow, no border, rounded-2xl.</Card>
        <Card brand="nbv" hoverable style={{ width: 220 }}>NBV card — bordered, hover lift.</Card>
      </Row>
      <Row label="Inputs">
        <Input placeholder="Search medicines, health products…" style={{ width: 260 }} />
        <Input brand="nbv" placeholder="Your email" style={{ width: 220 }} />
      </Row>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
