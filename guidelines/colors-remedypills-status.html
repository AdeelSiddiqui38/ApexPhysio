<!-- @dsCard group="Colors" viewport="700x150" name="RemedyPills Status Pills" subtitle="Prescription status colors" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);padding:16px;box-sizing:border-box;display:flex;gap:10px;align-items:center}
.pill{border-radius:9999px;padding:6px 14px;font-size:13px;font-weight:600;border:1px solid}</style></head>
<body>
<span class="pill" style="background:var(--rp-status-active-bg);color:var(--rp-status-active-fg);border-color:var(--rp-status-active-bd)">Active</span>
<span class="pill" style="background:var(--rp-status-processing-bg);color:var(--rp-status-processing-fg);border-color:var(--rp-status-processing-bd)">Processing</span>
<span class="pill" style="background:var(--rp-status-ready-bg);color:var(--rp-status-ready-fg);border-color:var(--rp-status-ready-bd)">Ready for Pickup</span>
<span class="pill" style="background:var(--rp-status-completed-bg);color:var(--rp-status-completed-fg);border-color:var(--rp-status-completed-bd)">Completed</span>
</body></html>
