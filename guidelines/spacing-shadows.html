<!-- @dsCard group="Spacing" viewport="700x200" name="Shadows" subtitle="Card, nav, elevated + NBV soft shadows" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px;font-family:var(--font-sans);box-sizing:border-box;display:flex;gap:24px;background:#f8fafc}
.card{width:130px;height:100px;background:#fff;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#64748b;text-align:center;padding:8px}</style></head>
<body>
<div class="card" style="box-shadow:var(--rp-shadow-card)">rp-shadow-card</div>
<div class="card" style="box-shadow:var(--rp-shadow-elevated)">rp-shadow-elevated</div>
<div class="card" style="box-shadow:var(--nbv-shadow-soft-sm)">nbv-soft-sm</div>
<div class="card" style="box-shadow:var(--nbv-shadow-soft-lg)">nbv-soft-lg</div>
</body></html>
