<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:#f8fafc;padding:14px;box-sizing:border-box}.row{display:flex;gap:10px}.sw{flex:1;height:100px;border-radius:16px;display:flex;align-items:flex-end;padding:8px;font-size:11px;font-weight:600}</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--rp-tile-teal-bg);color:var(--rp-tile-teal-fg)">teal</div>
  <div class="sw" style="background:var(--rp-tile-amber-bg);color:var(--rp-tile-amber-fg)">amber</div>
  <div class="sw" style="background:var(--rp-tile-blue-bg);color:var(--rp-tile-blue-fg)">blue</div>
  <div class="sw" style="background:var(--rp-tile-pink-bg);color:var(--rp-tile-pink-fg)">pink</div>
  <div class="sw" style="background:var(--rp-tile-purple-bg);color:var(--rp-tile-purple-fg)">purple</div>
  <div class="sw" style="background:var(--rp-tile-orange-bg);color:var(--rp-tile-orange-fg)">orange</div>
  <div class="sw" style="background:var(--rp-tile-emerald-bg);color:var(--rp-tile-emerald-fg)">emerald</div>
</div>
</body></html>
