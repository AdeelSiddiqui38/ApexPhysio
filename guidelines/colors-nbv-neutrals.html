<!-- @dsCard group="Colors" viewport="700x140" name="NBV Neutrals & Teal Scale" subtitle="Background, secondary, border, teal scale" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans)}.row{display:flex;height:70px}.sw{flex:1;display:flex;align-items:center;justify-content:center;font-size:11px;border-right:1px solid #eee}</style></head>
<body>
<div class="row">
  <div class="sw" style="background:hsl(var(--nbv-background));border:1px solid hsl(var(--nbv-border))">background</div>
  <div class="sw" style="background:hsl(var(--nbv-secondary))">secondary</div>
  <div class="sw" style="background:hsl(var(--nbv-muted-foreground));color:#fff">muted-fg</div>
</div>
<div class="row">
  <div class="sw" style="background:var(--nbv-teal-100)">teal-100</div>
  <div class="sw" style="background:var(--nbv-teal-400);color:#fff">teal-400</div>
  <div class="sw" style="background:var(--nbv-teal-600);color:#fff">teal-600</div>
  <div class="sw" style="background:var(--nbv-teal-900);color:#fff">teal-900</div>
</div>
</body></html>
