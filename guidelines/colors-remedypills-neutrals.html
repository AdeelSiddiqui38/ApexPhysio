<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans)}.row{display:flex;height:140px}.sw{flex:1;display:flex;align-items:flex-end;padding:8px;font-size:11px}</style></head>
<body>
<div class="row">
  <div class="sw" style="background:hsl(var(--rp-background))">background</div>
  <div class="sw" style="background:hsl(var(--rp-card));border-right:1px solid hsl(var(--rp-border))">card</div>
  <div class="sw" style="background:hsl(var(--rp-muted))">muted</div>
  <div class="sw" style="background:hsl(var(--rp-foreground));color:#fff">foreground</div>
  <div class="sw" style="background:hsl(var(--rp-muted-foreground));color:#fff">muted-fg</div>
</div>
</body></html>
