<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing Scale" subtitle="4px base unit, 4–48px steps" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;font-family:var(--font-sans);box-sizing:border-box;display:flex;flex-direction:column;gap:6px}
.row{display:flex;align-items:center;gap:10px;font-size:11px;color:#64748b}
.bar{background:hsl(var(--rp-primary));height:12px}</style></head>
<body>
<div class="row"><div class="bar" style="width:var(--space-1)"></div>4px</div>
<div class="row"><div class="bar" style="width:var(--space-2)"></div>8px</div>
<div class="row"><div class="bar" style="width:var(--space-3)"></div>12px</div>
<div class="row"><div class="bar" style="width:var(--space-4)"></div>16px</div>
<div class="row"><div class="bar" style="width:var(--space-6)"></div>24px</div>
<div class="row"><div class="bar" style="width:var(--space-8)"></div>32px</div>
<div class="row"><div class="bar" style="width:var(--space-12)"></div>48px</div>
</body></html>
